name: Deploy to Namecheap cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: SSH Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}

          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"

            cd ~/app
            git pull origin main
            npm install --production

            # Reload using ecosystem file (production env, zero downtime)
            pm2 reload ecosystem.config.js --env production \
              || pm2 start ecosystem.config.js --env production

            pm2 save
            pm2 list

            # Record deployment in history
            VERSION=$(node -e "console.log(require('./package.json').version)")
            curl -s -X POST http://localhost:3000/api/deployments \
              -H "Content-Type: application/json" \
              -d "{\"version\":\"$VERSION\",\"message\":\"Automated deployment via GitHub Actions\",\"status\":\"success\"}" \
              && echo "Deployment recorded ✅" \
              || echo "Warning: Could not record deployment"

            echo "✅ Deployment complete at $(date)"

      - name: Verify Deployment
        run: |
          sleep 8
          curl --fail --silent https://app.apexstrategicpartners.co/health \
            && echo "✅ Health check passed — app is live!" \
            || echo "⚠️ Health check failed — check PM2 logs"
